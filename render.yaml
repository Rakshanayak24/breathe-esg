services:
  - type: web
    name: breathe-esg-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py setup_demo
    startCommand: gunicorn breathe_esg.wsgi:application --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: breathe-esg-backend.onrender.com
      - key: CORS_ALLOW_ALL_ORIGINS
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString

  - type: web
    name: breathe-esg-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://breathe-esg-backend.onrender.com/api

databases:
  - name: breathe-esg-db
    databaseName: breathe_esg
    user: breathe_esg
